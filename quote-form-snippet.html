<!--
  ═══════════════════════════════════════════════════════════════════════
  VRA · Canonical Quote-Request Form (single source of truth)
  ═══════════════════════════════════════════════════════════════════════

  This snippet is the ONE definition of the quote form. Any change to
  fields, labels, options, or required/optional state MUST be made here
  first, then propagated to every host page that embeds it.

  Used on:
    - index.html             ("Know what you need? Tell us." section)
    - contact.html           (Contact hero, right column)
    - healthcare.html        (Request a healthcare quote)
    - hospitality.html       (Request a hospitality quote)
    - multifamily.html       (Request a multifamily quote)
    - business.html          (Request a business quote)

  Required on every host page:
    <link rel="stylesheet" href="css/quote-form.css">
    <script src="js/quote-form.js" defer></script>

  Field name attributes (NowCerts / Momentum AMS mapping):
    first_name          → Contact: First name
    last_name           → Contact: Last name
    business_name       → Account / Insured name
    email               → Contact email
    phone               → Contact phone
    industry            → Line of business
    specialty           → Policy type / sub-LOB           (optional)
    other_industry      → Remarks (if industry = other)   (optional)
    other_specialty     → Remarks (if specialty = *-other)(optional)
    current_carrier     → Current carrier                  (optional)
    policy_expiration   → Expiration date (MM/YYYY)        (optional)
    notes               → Notes / Remarks                  (optional)

  Submission backend: not wired yet. js/quote-form.js validates and
  shows the success panel client-side. The submit handler has a single
  hook point (`// → webhook integration point` in quote-form.js) where
  NowCerts/Momentum/Google Workspace webhooks can be added.

  Do NOT modify per-page copies in isolation. Edit this file first.
  ═══════════════════════════════════════════════════════════════════════
-->
<form class="quote-form" novalidate>

  <div class="qf-row">
    <div class="qf-field" data-field="first_name">
      <label for="qf-first-name">First name <span class="req">*</span></label>
      <input id="qf-first-name" name="first_name" type="text" autocomplete="given-name" required>
      <div class="qf-error" role="alert"></div>
    </div>
    <div class="qf-field" data-field="last_name">
      <label for="qf-last-name">Last name <span class="req">*</span></label>
      <input id="qf-last-name" name="last_name" type="text" autocomplete="family-name" required>
      <div class="qf-error" role="alert"></div>
    </div>
  </div>

  <div class="qf-field" data-field="business_name">
    <label for="qf-business-name">Business name <span class="req">*</span></label>
    <input id="qf-business-name" name="business_name" type="text" autocomplete="organization" required>
    <div class="qf-error" role="alert"></div>
  </div>

  <div class="qf-row">
    <div class="qf-field" data-field="email">
      <label for="qf-email">Email address <span class="req">*</span></label>
      <input id="qf-email" name="email" type="email" autocomplete="email" required>
      <div class="qf-error" role="alert"></div>
    </div>
    <div class="qf-field" data-field="phone">
      <label for="qf-phone">Phone <span class="req">*</span></label>
      <input id="qf-phone" name="phone" type="tel" autocomplete="tel" placeholder="(___) ___-____" required>
      <div class="qf-error" role="alert"></div>
    </div>
  </div>

  <div class="qf-field" data-field="industry">
    <label for="qf-industry">Business type / industry <span class="req">*</span></label>
    <select id="qf-industry" name="industry" required>
      <option value="" disabled selected>Choose an industry…</option>
      <option value="healthcare">Healthcare</option>
      <option value="hospitality">Hospitality</option>
      <option value="multifamily">Multifamily</option>
      <option value="hoa">HOA</option>
      <option value="business">Business insurance</option>
      <option value="other">Something else</option>
    </select>
    <div class="qf-error" role="alert"></div>
  </div>

  <!-- Cascade: Specialty (populated by JS based on selected industry) -->
  <div class="qf-field qf-cascade" data-cascade-for="specialty" data-field="specialty">
    <label for="qf-specialty">Specialty</label>
    <select id="qf-specialty" name="specialty">
      <option value="" disabled selected>Choose a specialty…</option>
    </select>
  </div>

  <!-- Cascade: Describe your industry (when industry = other) -->
  <div class="qf-field qf-cascade" data-cascade-for="other_industry" data-field="other_industry">
    <label for="qf-other-industry">Describe your industry</label>
    <input id="qf-other-industry" name="other_industry" type="text">
  </div>

  <!-- Cascade: Describe your specialty (when specialty value ends with -other) -->
  <div class="qf-field qf-cascade" data-cascade-for="other_specialty" data-field="other_specialty">
    <label for="qf-other-specialty">Describe your specialty</label>
    <input id="qf-other-specialty" name="other_specialty" type="text">
  </div>

  <div class="qf-row">
    <div class="qf-field" data-field="current_carrier">
      <label for="qf-current-carrier">Current carrier</label>
      <input id="qf-current-carrier" name="current_carrier" type="text">
    </div>
    <div class="qf-field" data-field="policy_expiration">
      <label for="qf-policy-expiration">Policy expiration</label>
      <input id="qf-policy-expiration" name="policy_expiration" type="text" placeholder="MM/YYYY">
    </div>
  </div>

  <div class="qf-field" data-field="notes">
    <label for="qf-notes">Additional notes</label>
    <textarea id="qf-notes" name="notes" rows="3"></textarea>
  </div>

  <div class="qf-submit">
    <button type="submit" class="btn btn-accent btn-block">Send my request <span aria-hidden="true">→</span></button>
  </div>

  <p class="qf-foot">We respond within one business day &nbsp;·&nbsp; No obligation &nbsp;·&nbsp; Your data stays with VRA</p>
</form>

<div class="qf-success" hidden>
  <h3>Thank you — we'll be in touch within one business day.</h3>
</div>
